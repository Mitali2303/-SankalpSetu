name: Sync Fork with Upstream

on:
  schedule:
    - cron: '0 * * * *'   # Runs every hour
  workflow_dispatch:      # Also allows manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v3
        with:
          ref: main

      - name: Configure Git
        run: |
          git config user.name "Mitali Agrawal"
          git config user.email "mitaliagrawal012@gmail.com"

      - name: Add and fetch upstream
        run: |
          git remote add upstream https://github.com/nehasharma2210/SankalpSetu.git
          git fetch upstream
          git merge upstream/main --allow-unrelated-histories -m "Auto-sync from upstream"
          git push origin main
