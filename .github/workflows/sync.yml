name: Sync Fork with Upstream

on:
  schedule:
    - cron: '0 * * * *' # Every hour
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout your repository
        uses: actions/checkout@v3

      - name: Configure Git
        run: |
          git config --global user.name 'Mitali Agrawal'
          git config --global user.email 'mitaliagrawal012@gmail.com'

      - name: Set up remote and fetch
        run: |
          git remote add upstream https://github.com/nehasharma2210/SankalpSetu.git
          git fetch upstream
          git checkout main
          git merge upstream/main --allow-unrelated-histories -m "🔄 Auto-sync with upstream"
          git push origin main
