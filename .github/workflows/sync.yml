name: Sync Fork with Upstream

on:
  schedule:
    - cron: '0 * * * *'  # Every hour
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout your repository
        uses: actions/checkout@v3

      - name: Configure Git
        run: |
          git config --global user.name 'Mitali Agrawal'
          git config --global user.email 'mitaliagrawal012@gmail.com'

      - name: Set up remote and fetch upstream
        run: |
          git remote add upstream https://github.com/nehasharma2210/SankalpSetu.git
          git fetch upstream

      - name: Merge upstream/main into fork/main
        run: |
          git checkout main
          git merge upstream/main --allow-unrelated-histories

      - name: Push changes to your fork
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push https://x-access-token:${TOKEN}@github.com/Mitali2303/-SankalpSetu.git main

