services:
  - type: web
    name: sankalp-setu
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn sankalpSetu.wsgi:application
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: sankalpSetu.settings
      - key: DEBUG
        value: False
      - key: SECRET_KEY
        value: ${SECRET_KEY}
      - key: ALLOWED_HOSTS
        value: *
